<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ff8c66" />
  <!-- iOS Safari before 16.4 ignores the manifest's display:standalone and
       needs these instead to open chrome-less from the home screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Travel Planner" />
  <title>Travel Planner</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>Plan a trip</h1>
    <p><a href="/trips.html">View saved trips &rarr;</a> &middot; <a href="/runs.html">View past runs &rarr;</a></p>

    <form id="plan-form" class="card">
      <label>
        City / region
        <input type="text" name="city" required placeholder="e.g. testville" />
      </label>
      <label>
        Departure date
        <input type="date" name="start_date" required />
      </label>
      <label>
        Days
        <input type="number" name="days" min="1" max="7" value="2" required />
      </label>
      <fieldset>
        <legend>Preferences</legend>
        <label class="checkbox"><input type="checkbox" name="preferences" value="museum" /> Museums</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="nature" /> Nature scenery</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="food" /> Food</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="historic" /> Historic sites</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="shopping" /> Shopping</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="night_market" /> Night markets</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="hiking" /> Hiking</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="golf" /> Golf</label>
      </fieldset>
      <button type="submit">Plan my trip</button>
    </form>

    <section id="live-view" class="card hidden">
      <h2>Watching the agent think…</h2>
      <ol id="step-list"></ol>
    </section>

    <section id="result-view" class="card hidden">
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
      <div id="itinerary"></div>
      <div id="map-section" class="hidden">
        <div id="map-tabs" role="tablist"></div>
        <div id="map"></div>
        <p id="map-unavailable" class="hidden">Map isn't configured on this deployment yet.</p>
      </div>
    </section>
  </main>

  <script src="viewer.js"></script>
  <script src="app.js"></script>
</body>
</html>
