<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ff8c66" />
  <!-- iOS Safari before 16.4 ignores the manifest's display:standalone and
       needs these instead to open chrome-less from the home screen. -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="行程規劃助手" />
  <title>行程規劃助手</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <h1>規劃行程</h1>
    <p><a href="/trips.html">查看已儲存的行程 &rarr;</a> &middot; <a href="/runs.html">查看歷史紀錄 &rarr;</a></p>

    <form id="plan-form" class="card">
      <label>
        城市／地區
        <input type="text" name="city" required placeholder="例如：testville" />
      </label>
      <label>
        出發地點
        <input type="text" name="origin" required placeholder="例如：testville（每天都會從這裡出發、回到這裡）" />
      </label>
      <label>
        出發日期
        <input type="date" name="start_date" required />
      </label>
      <label>
        天數
        <input type="number" name="days" min="1" max="7" value="2" required />
      </label>
      <fieldset>
        <legend>偏好</legend>
        <label class="checkbox"><input type="checkbox" name="preferences" value="museum" /> 博物館</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="nature" /> 自然風景</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="food" /> 美食</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="historic" /> 歷史景點</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="shopping" /> 購物</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="night_market" /> 夜市</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="hiking" /> 健行</label>
        <label class="checkbox"><input type="checkbox" name="preferences" value="golf" /> 高爾夫</label>
      </fieldset>
      <button type="submit">開始規劃</button>
    </form>

    <section id="live-view" class="card hidden">
      <h2>正在觀察代理人思考中&hellip;</h2>
      <ol id="step-list"></ol>
    </section>

    <section id="result-view" class="card hidden">
      <h2 id="result-title"></h2>
      <p id="result-message"></p>
      <div id="itinerary"></div>
      <div id="map-section" class="hidden">
        <div id="map-tabs" role="tablist"></div>
        <div id="map"></div>
        <p id="map-unavailable" class="hidden">地圖尚未在此部署設定。</p>
      </div>
    </section>
  </main>

  <script src="viewer.js"></script>
  <script src="app.js"></script>
</body>
</html>
